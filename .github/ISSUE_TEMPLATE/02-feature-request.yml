# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json

name: 💡 我有个想法
description: 建议新功能、推送样式改进或体验优化
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💝 欢迎分享你的创意
        你的好点子能让 Argus 变得更好！
        
        目前主要关注以下方向的改进：
        - ✨ **AI 分析能力**：更智能的解读、更丰富的分析维度
        - 🎨 **推送体验**：更好看的排版、更合理的信息展示
        - 🛠️ **易用性优化**：配置更简单、运行更稳定
        
        *注：目前暂不接受新爬虫平台的接入申请，感谢理解。*

  - type: textarea
    id: feature-description
    attributes:
      label: 💭 你的想法是什么？
      placeholder: |
        请简要描述：
        - 你希望增加什么功能？
        - 它能解决什么问题？
        - 如果有参考的图片或工具，欢迎上传截图。
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 🎯 使用场景（可选）
      placeholder: 例如：当我在...的时候，如果能...就太棒了。
    validations:
      required: false
